name: Publish bin-clean.ics to Pages

on:
  schedule:
    - cron: "0 6 * * *"   # daily at ~06:00 UTC
  workflow_dispatch:
    inputs:
      debug:
        description: "Dump the schedule fragment structure (address-redacted) for debugging"
        type: boolean
        default: false

# Scheduled runs use the default branch's copy of this workflow.
permissions:
  contents: read
  pages: write
  id-token: write

# Let a run finish deploying before the next starts; don't cancel a
# half-finished deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        env:
          WFB_EMAIL: ${{ secrets.WFB_EMAIL }}
          WFB_PASSWORD: ${{ secrets.WFB_PASSWORD }}
          WFB_BOOKING_ID: ${{ secrets.WFB_BOOKING_ID }}
          WFB_DEBUG: ${{ inputs.debug && '1' || '' }}
        run: python scraper.py

      - name: Sanity-check output
        run: |
          test -s bin-clean.ics
          grep -q "BEGIN:VEVENT" bin-clean.ics

      - name: Assemble Pages site
        run: |
          mkdir -p _site
          cp bin-clean.ics _site/bin-clean.ics
          cat > _site/index.html <<'EOF'
          <!doctype html>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <title>Bin clean calendar</title>
          <h1>Bin clean calendar</h1>
          <p>Subscribe to <a href="bin-clean.ics">bin-clean.ics</a> in your calendar app.</p>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
